    <style>
      #adw-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a0a00;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #adw-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #adw-loader img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        animation: adw-spin 1.8s linear infinite;
        filter: drop-shadow(0 0 24px rgba(220,160,60,0.5));
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
      }
      #adw-loader img:active {
        transform: scale(0.92);
        filter: drop-shadow(0 0 36px rgba(220,160,60,0.85));
      }
      #adw-loader .adw-skip {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.28);
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
        padding: 8px 16px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        transition: color 0.2s, border-color 0.2s;
      }
      #adw-loader .adw-skip:hover,
      #adw-loader .adw-skip:active {
        color: rgba(255,255,255,0.7);
        border-color: rgba(255,255,255,0.35);
      }
      @keyframes adw-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      #adw-loader .adw-label {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.55);
      }
      #adw-loader .adw-dots span {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #e8a020;
        margin: 0 3px;
        animation: adw-bounce 1.2s ease-in-out infinite;
      }
      #adw-loader .adw-dots span:nth-child(2) { animation-delay: 0.2s; }
      #adw-loader .adw-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes adw-bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%            { transform: scale(1);   opacity: 1;   }
      }
      @media (prefers-reduced-motion: reduce) {
        #adw-loader img { animation: none; opacity: 0.9; }
        #adw-loader .adw-dots span { animation: none; opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="adw-loader" role="status" aria-label="Loading Ancestral Designer Wear">
      <img src="./assets/logo-ancestral-nobg.png" alt="" aria-hidden="true" />
      <div class="adw-label" aria-hidden="true">Ancestral Designer Wear</div>
      <div class="adw-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="adw-skip" aria-hidden="true">Tap to enter</div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var dismissed = false;
        function hideLoader() {
          if (dismissed) return;
          dismissed = true;
          var loader = document.getElementById('adw-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function () { loader.remove(); }, 700);
          }
        }
        // Dismiss on click or touch anywhere on the loader
        var loader = document.getElementById('adw-loader');
        if (loader) {
          loader.addEventListener('click', hideLoader);
          loader.addEventListener('touchend', function (e) {
            e.preventDefault();
            hideLoader();
          }, { passive: false });
        }
        // Auto-hide once the page is fully loaded (images + scripts)
        if (document.readyState === 'complete') {
          setTimeout(hideLoader, 800);
        } else {
          window.addEventListener('load', function () {
            setTimeout(hideLoader, 800);
          });
        }
        // Safety net: remove after 5 s regardless
        setTimeout(hideLoader, 5000);
      })();
    </script>
  </body>
